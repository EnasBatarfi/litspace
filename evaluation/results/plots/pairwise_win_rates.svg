<svg xmlns="http://www.w3.org/2000/svg" width="960" height="314" viewBox="0 0 960 314" role="img"><style>.title{font:700 24px Arial,sans-serif;fill:#0f172a;}.subtitle{font:400 13px Arial,sans-serif;fill:#475569;}.label{font:600 13px Arial,sans-serif;fill:#0f172a;}.tick{font:400 12px Arial,sans-serif;fill:#64748b;}.value{font:700 12px Arial,sans-serif;fill:#0f172a;}.foot{font:400 11px Arial,sans-serif;fill:#64748b;}</style><rect x="0" y="0" width="960" height="314" fill="#f8fafc" /><text x="36" y="42" class="title">Pairwise Comparison Against Baselines</text><text x="36" y="64" class="subtitle">Each row shows LitSpace win rate, baseline win rate, and tie rate.</text><line x1="250.00" y1="80" x2="250.00" y2="220" stroke="#e2e8f0" stroke-width="1" /><text x="250.00" y="242" class="tick" text-anchor="middle">0%</text><line x1="407.50" y1="80" x2="407.50" y2="220" stroke="#e2e8f0" stroke-width="1" /><text x="407.50" y="242" class="tick" text-anchor="middle">25%</text><line x1="565.00" y1="80" x2="565.00" y2="220" stroke="#e2e8f0" stroke-width="1" /><text x="565.00" y="242" class="tick" text-anchor="middle">50%</text><line x1="722.50" y1="80" x2="722.50" y2="220" stroke="#e2e8f0" stroke-width="1" /><text x="722.50" y="242" class="tick" text-anchor="middle">75%</text><line x1="880.00" y1="80" x2="880.00" y2="220" stroke="#e2e8f0" stroke-width="1" /><text x="880.00" y="242" class="tick" text-anchor="middle">100%</text><text x="234" y="119" class="label" text-anchor="end">LitSpace vs zero-shot</text><rect x="250.00" y="102" width="476.00" height="26" fill="#0f766e" /><text x="488.00" y="119" class="tick" text-anchor="middle" fill="#ffffff">75.6%</text><rect x="726.00" y="102" width="84.00" height="26" fill="#c2410c" /><text x="768.00" y="119" class="tick" text-anchor="middle" fill="#ffffff">13.3%</text><rect x="810.00" y="102" width="70.00" height="26" fill="#94a3b8" /><text x="845.00" y="119" class="tick" text-anchor="middle" fill="#ffffff">11.1%</text><text x="234" y="183" class="label" text-anchor="end">LitSpace vs summary few-shot</text><rect x="250.00" y="166" width="308.00" height="26" fill="#0f766e" /><text x="404.00" y="183" class="tick" text-anchor="middle" fill="#ffffff">48.9%</text><rect x="558.00" y="166" width="210.00" height="26" fill="#c2410c" /><text x="663.00" y="183" class="tick" text-anchor="middle" fill="#ffffff">33.3%</text><rect x="768.00" y="166" width="112.00" height="26" fill="#94a3b8" /><text x="824.00" y="183" class="tick" text-anchor="middle" fill="#ffffff">17.8%</text><rect x="36" y="260" width="16" height="16" rx="3" fill="#0f766e" /><text x="60" y="273" class="tick">LitSpace win</text><rect x="206" y="260" width="16" height="16" rx="3" fill="#c2410c" /><text x="230" y="273" class="tick">Baseline win</text><rect x="376" y="260" width="16" height="16" rx="3" fill="#94a3b8" /><text x="400" y="273" class="tick">Tie</text><text x="36" y="298" class="foot">Pairwise values are taken directly from metrics_summary.json.</text></svg>